<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Класснеймы донат вещей</title>
  <style>
    :root {
      --bg1: #050816;
      --bg2: #0b1220;
      --panel: rgba(10, 15, 30, 0.72);
      --line: rgba(255, 255, 255, 0.08);
      --text: #e5eefc;
      --muted: #8ea0c0;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --success: #22c55e;
      --danger: #ef4444;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 10%, rgba(124, 58, 237, 0.22), transparent 24%), radial-gradient(circle at 90% 0%, rgba(6, 182, 212, 0.18), transparent 28%), linear-gradient(160deg, var(--bg1), var(--bg2));
      min-height: 100vh; padding: 28px 16px 44px;
    }
    .wrap { max-width: 1800px; margin: 0 auto; }
    
    /* ✅ КНОПКА АВТОРИЗАЦИИ СПРАВА */
    .auth-btn-fixed {
      position: fixed; top: 32px; right: 32px; z-index: 9999;
      background: linear-gradient(135deg, var(--accent), #9333ea);
      border: 0; border-radius: 50px; padding: 16px 24px; 
      color: white; font: inherit; font-weight: 700; font-size: 14px;
      box-shadow: 0 16px 40px rgba(124,58,237,0.4); cursor: pointer;
      transition: all 0.3s ease; backdrop-filter: blur(20px);
    }
    .auth-btn-fixed:hover { 
      transform: translateY(-4px) scale(1.05); 
      box-shadow: 0 24px 60px rgba(124,58,237,0.6); 
    }
    .auth-btn-fixed.authenticated {
      background: linear-gradient(135deg, var(--success), #16a34a);
      animation: pulse 2s infinite;
    }
    .auth-btn-fixed.authenticated:hover {
      box-shadow: 0 24px 60px rgba(34,197,94,0.6);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 16px 40px rgba(34,197,94,0.4); }
      50% { box-shadow: 0 16px 40px rgba(34,197,94,0.7); }
    }
    
    /* Модальное окно авторизации */
    .auth-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.9); z-index: 10000; display: none; 
      align-items: center; justify-content: center; backdrop-filter: blur(20px);
    }
    .auth-panel {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); 
      padding: 48px; max-width: 420px; width: 90%; box-shadow: var(--shadow);
      text-align: center;
    }
    .auth-panel h2 { margin: 0 0 32px 0; color: var(--accent); font-size: 28px; }
    .auth-field { position: relative; margin-bottom: 24px; }
    .auth-field input {
      width: 100%; border: 1px solid rgba(255,255,255,0.1); background: rgba(6,10,20,0.55); 
      color: #fff; border-radius: 14px; padding: 18px 20px; font-size: 16px; box-sizing: border-box;
    }
    .auth-field input:focus { 
      border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(6,182,212,0.14); outline: none; 
    }
    .auth-btn {
      width: 100%; border: 0; border-radius: 16px; padding: 18px; font: inherit; font-weight: 700; 
      color: white; cursor: pointer; background: linear-gradient(135deg, var(--accent2), #0891b2);
      box-shadow: 0 12px 28px rgba(6,182,212,0.4); transition: all 0.2s ease;
    }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 36px rgba(6,182,212,0.5); }
    .auth-error { color: var(--danger); margin-top: 16px; font-size: 14px; display: none; }
    
    /* Скрываем редактирование без авторизации */
    .edit-hidden { display: none !important; }
    .edit-visible { display: inline-flex !important; }
    
    /* Основные стили */
    .table-head { 
      display: grid; 
      grid-template-columns: 1.5fr 500px 2.5fr 140px;
      border-bottom: 1px solid var(--line); 
      background: rgba(255, 255, 255, 0.03); 
      color: #f4f7ff; 
      text-transform: uppercase; 
      letter-spacing: 0.09em; 
      font-size: 12px; 
      font-weight: 800; 
    }
    .table-head div, .row > div { padding: 20px 16px; display: flex; align-items: center; min-height: 100%; }
    .rows { display: flex; flex-direction: column; max-height: 75vh; overflow-y: auto; }
    .row { 
      border-bottom: 1px solid var(--line); 
      background: rgba(255, 255, 255, 0.015); 
      transition: all 0.2s ease; 
      display: grid; 
      grid-template-columns: 1.5fr 500px 2.5fr 140px;
    }
    
    .title { 
      font-size: 18px; 
      font-weight: 800; 
      line-height: 1.3; 
      color: var(--accent); 
      background: rgba(124, 58, 237, 0.15); 
      padding: 12px 16px; 
      border-radius: 12px; 
      border: 2px solid rgba(124, 58, 237, 0.4);
      min-height: 24px;
    }
    .title.editing {
      background: rgba(6, 182, 212, 0.15);
      border-color: var(--accent2);
      padding: 10px 14px;
    }
    
    .thumb { 
      width: 500px !important; 
      height: 300px !important; 
      object-fit: cover; 
      border-radius: 20px; 
      border: 2px solid rgba(255, 255, 255, 0.15); 
      cursor: pointer; 
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4); 
      transition: all 0.3s ease; 
    }
    .thumb:hover { 
      transform:scale(1.02) !important; 
      border-color: rgba(6, 182, 212, 0.7); 
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5); 
    }
    
    .description { 
      color: var(--text); 
      font-size: 15px; 
      line-height: 1.5; 
      padding: 20px; 
      background: rgba(255, 255, 255, 0.03); 
      border-radius: 16px; 
      border: 1px solid var(--line); 
      white-space: pre-wrap; 
      max-height: 120px; 
      overflow-y: auto; 
    }
    .description:empty::before { content: "Класснеймы не указаны"; color: var(--muted); font-style: italic; }
    
    button { border: 0; border-radius: 16px; padding: 12px 18px; font: inherit; font-weight: 700; color: white; cursor: pointer; transition: all 0.18s ease; box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24); }
    button:hover { transform: translateY(-1px); }
    .btn-edit { background: linear-gradient(135deg, #2563eb, #7c3aed); }
    .btn-add { background: linear-gradient(135deg, #059669, #10b981); }
    .btn-save { background: linear-gradient(135deg, #0ea5e9, #2563eb); display: none; }
    .btn-cancel { background: linear-gradient(135deg, #ef4444, #f97316); display: none; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); backdrop-filter: blur(18px); }
    .row:hover { background: rgba(255, 255, 255, 0.05); }
    .actions { justify-content: flex-end; gap: 8px; }
    .icon-btn { padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: 800; box-shadow: none; }
    .edit-row-btn { background: linear-gradient(135deg, #f59e0b, #f97316); }
    .delete-row-btn { background: linear-gradient(135deg, #dc2626, #ef4444); }
    
    .new-row { display: none; padding: 30px; background: rgba(255, 255, 255, 0.03); }
    .new-row.active { display: block; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { color: var(--muted); font-size: 13px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
    .field input, .field textarea { width: 100%; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(6, 10, 20, 0.55); color: #fff; border-radius: 14px; padding: 16px; font: inherit; }
    .field input:focus, .field textarea:focus { border-color: rgba(6, 182, 212, 0.7); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.14); }
    .field textarea { min-height: 140px; resize: vertical; }
    .preview-box { height: 320px; border-radius: 20px; border: 2px dashed rgba(255, 255, 255, 0.18); background: rgba(255, 255, 255, 0.04); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; }
    .preview-box:hover { border-color: rgba(6, 182, 212, 0.7); transform: translateY(-3px); }
    .preview-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .hidden-file { display: none; }
    .status { padding: 14px; border-radius: 12px; margin-top: 20px; font-size: 15px; display: none; }
    .status.success { background: rgba(34, 197, 94, 0.2); border: 1px solid var(--success); color: var(--success); }
    
    /* Адаптивность */
    @media (max-width: 1400px) { .table-head, .row { grid-template-columns: 1fr 420px 2fr 120px; } .thumb { width: 420px; height: 250px; } }
    @media (max-width: 1100px) { .table-head, .row { grid-template-columns: 1fr 350px 2fr 120px; } .thumb { width: 350px; height: 210px; } }
    @media (max-width: 920px) { 
      .table-head, .row { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .thumb { width: 100%; height: 300px; }
      .preview-box { height: 280px; }
      .auth-btn-fixed { top: 20px; right: 20px; padding: 14px 20px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <!-- ✅ КНОПКА АВТОРИЗАЦИИ СПРАВА -->
  <button id="authToggle" class="auth-btn-fixed">🔐 Авторизация</button>
  
  <!-- Модальное окно авторизации -->
  <div id="authModal" class="auth-modal">
    <div class="auth-panel">
      <h2>🔐 Вход в админку</h2>
      <div class="auth-field">
        <input type="text" id="loginInput" placeholder="Логин" maxlength="20">
      </div>
      <div class="auth-field">
        <input type="password" id="passwordInput" placeholder="Пароль" maxlength="20">
      </div>
      <button class="auth-btn" onclick="checkAuth()">Войти</button>
      <div id="authError" class="auth-error">❌ Неверный логин или пароль!</div>
    </div>
  </div>

  <div class="wrap">
    <div class="hero">
      <div class="title-block">
        <h1>Класснеймы донат вещей</h1>
        <p>🖼️ Огромные скриншоты 500x300 • Редактирование названий • localStorage база</p>
      </div>
      <div class="controls">
        <button class="btn-edit edit-hidden" id="toggleEdit">Редактировать</button>
        <button class="btn-add edit-hidden" id="openNewRow">Добавить</button>
        <button class="btn-save" id="saveNewRow">Сохранить</button>
        <button class="btn-cancel" id="cancelNewRow">Отмена</button>
      </div>
    </div>

    <div class="panel">
      <div class="table-head">
        <div>Название</div><div>Скриншот</div><div>Класснеймы</div><div>Действия</div>
      </div>

      <div id="newRowForm" class="new-row edit-hidden">
        <div class="form-grid">
         <div class="field">
           <label>Название *</label>
           <input type="text" id="newTitle" placeholder="Название (можно редактировать)">
         </div>
         <div class="field">
           <label>Скриншот *</label>
           <div class="preview-box" id="newPreviewBox">
             <span id="newPreviewText">Клик для загрузки</span>
             <img id="newPreviewImg" alt="Предпросмотр">
           </div>
           <input class="hidden-file" type="file" id="newImageInput" accept="image/*">
         </div>
        </div>
        <div class="field" style="grid-column: 1/-1; margin-top: 24px;">
         <label>Класснеймы</label>
         <textarea id="newDescription" placeholder="Введите класснеймы..."></textarea>
        </div>
        <div id="status" class="status"></div>
      </div>

      <div class="rows" id="rows"></div>
    </div>
  </div>

  <script>
    // Скрытые учетные данные (base64)
    const AUTH_DATA = atob('UmF6ZG9yOjIyODEzMzc='); // "Razdor:2281337"
    const [AUTH_LOGIN, AUTH_PASS] = AUTH_DATA.split(':');
    
    let isAuthenticated = localStorage.getItem('screenshot_auth') === 'true';
    
    // Проверка авторизации
    function checkAuth() {
      const login = document.getElementById('loginInput').value;
      const pass = document.getElementById('passwordInput').value;
      
      if (login === AUTH_LOGIN && pass === AUTH_PASS) {
        localStorage.setItem('screenshot_auth', 'true');
        isAuthenticated = true;
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('authToggle').textContent = '✅ Админ';
        document.getElementById('authToggle').classList.add('authenticated');
        showEditMode(true);
        if (window.db) window.db.render(); // Перерисовка если уже инициализировано
      } else {
        document.getElementById('authError').style.display = 'block';
        setTimeout(() => document.getElementById('authError').style.display = 'none', 3000);
      }
    }
    
    // Показать/скрыть режим редактирования
    function showEditMode(show) {
      const editElements = document.querySelectorAll('.edit-hidden');
      editElements.forEach(el => {
        el.classList.toggle('edit-hidden', !show);
        el.classList.toggle('edit-visible', show);
      });
    }
    
    // Инициализация кнопки авторизации
    document.getElementById('authToggle').onclick = () => {
      if (isAuthenticated) {
        // Выход из аккаунта
        if (confirm('Выйти из админки?')) {
          localStorage.removeItem('screenshot_auth');
          isAuthenticated = false;
          document.getElementById('authToggle').textContent = '🔐 Авторизация';
          document.getElementById('authToggle').classList.remove('authenticated');
          showEditMode(false);
          document.getElementById('authModal').style.display = 'none';
        }
      } else {
        document.getElementById('authModal').style.display = 'flex';
        document.getElementById('loginInput').focus();
      }
    };
    
    // Enter для авторизации
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && document.getElementById('authModal').style.display !== 'none') {
        checkAuth();
      }
    });
    
    // Инициализация при загрузке
    if (isAuthenticated) {
      document.getElementById('authToggle').textContent = '✅ Админ';
      document.getElementById('authToggle').classList.add('authenticated');
      showEditMode(true);
    }

    class ScreenshotDB {
      constructor() {
        window.db = this; // Глобальная ссылка для checkAuth
        this.DB_NAME = 'github_screenshots_v1';
        this.data = this.load();
        this.editMode = false;
        this.init();
      }

      load() { try { return JSON.parse(localStorage.getItem(this.DB_NAME)) || []; } catch { return []; } }
      save() { localStorage.setItem(this.DB_NAME, JSON.stringify(this.data)); this.status('✅ Сохранено!', 'success'); }

      status(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg; el.className = `status ${type}`; el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2500);
      }

      init() {
        this.render();
        if (isAuthenticated) {
          document.getElementById('toggleEdit').onclick = () => this.toggleEdit();
          document.getElementById('openNewRow').onclick = () => this.newForm();
          document.getElementById('saveNewRow').onclick = () => this.saveNew();
          document.getElementById('cancelNewRow').onclick = () => this.cancelNew();
        }
        
        document.getElementById('newPreviewBox').onclick = () => document.getElementById('newImageInput').click();
        document.getElementById('newImageInput').onchange = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              document.getElementById('newPreviewImg').src = ev.target.result;
              document.getElementById('newPreviewImg').style.display = 'block';
              document.getElementById('newPreviewText').style.display = 'none';
            };
            reader.readAsDataURL(file);
          }
        };
      }

      toggleEdit() {
        this.editMode = !this.editMode;
        document.getElementById('toggleEdit').textContent = this.editMode ? '✅ Завершить' : '✏️ Редактировать';
        document.getElementById('openNewRow').style.display = this.editMode ? 'inline-flex' : 'none';
        if (!this.editMode) this.cancelNew();
      }

      newForm() {
        document.getElementById('newRowForm').classList.add('active');
        document.getElementById('saveNewRow').style.display = 'inline-flex';
        document.getElementById('cancelNewRow').style.display = 'inline-flex';
        document.getElementById('newTitle').focus();
      }

      cancelNew() {
        document.getElementById('newRowForm').classList.remove('active');
        document.getElementById('saveNewRow').style.display = 'none';
        document.getElementById('cancelNewRow').style.display = 'none';
        this.resetForm();
      }

      resetForm() {
        document.getElementById('newTitle').value = '';
        document.getElementById('newDescription').value = '';
        document.getElementById('newImageInput').value = '';
        document.getElementById('newPreviewImg').style.display = 'none';
        document.getElementById('newPreviewText').style.display = 'block';
      }

      saveNew() {
        const title = document.getElementById('newTitle').value.trim();
        const desc = document.getElementById('newDescription').value.trim();
        const file = document.getElementById('newImageInput').files[0];
        
        if (!title || !file) { this.status('⚠️ Название и скриншот обязательны'); return; }

        const reader = new FileReader();
        reader.onload = (e) => {
          this.data.push({ title, description: desc, image: e.target.result });
          this.save(); this.render(); this.cancelNew();
        };
        reader.readAsDataURL(file);
      }

      render() {
        const rows = document.getElementById('rows');
        rows.innerHTML = this.data.length ? '' : '<div style="padding:60px;text-align:center;color:var(--muted);">Добавьте первый скриншот</div>';

        this.data.forEach((item, i) => {
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `
            <div class="name-cell">
              <div class="title cell-title" contentEditable="${this.editMode && isAuthenticated}">${this.escape(item.title)}</div>
            </div>
            <div>
              <img class="thumb cell-image" src="${item.image}" alt="${item.title}">
              <input class="hidden-file row-file" type="file" accept="image/*">
            </div>
            <div>
              <div class="description cell-description" contentEditable="false">${item.description||''}</div>
            </div>
            <div class="actions">
              <button class="icon-btn edit-row-btn ${!isAuthenticated ? 'edit-hidden' : ''}">Ред.</button>
              <button class="icon-btn delete-row-btn ${!isAuthenticated ? 'edit-hidden' : ''}">Удалить</button>
            </div>`;
          rows.appendChild(row);
          this.bindRow(row, i, item);
        });
      }

      bindRow(row, i, item) {
        const title = row.querySelector('.cell-title');
        const img = row.querySelector('.cell-image');
        const file = row.querySelector('.row-file');
        const edit = row.querySelector('.edit-row-btn');
        const del = row.querySelector('.delete-row-btn');
        const desc = row.querySelector('.cell-description');

        // Редактирование названия только для авторизованных
        if (isAuthenticated) {
          title.onclick = () => { if (this.editMode) { title.contentEditable = true; title.focus(); } };
          title.onblur = () => {
            item.title = title.textContent.trim() || item.title;
            title.contentEditable = false;
            this.save();
          };
          title.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); title.blur(); } };

          img.onclick = () => { if (this.editMode) file.click(); };
          file.onchange = (e) => {
            const f = e.target.files[0];
            if (f) {
              const r = new FileReader();
              r.onload = (ev) => { 
                this.data[i].image = ev.target.result; 
                this.save(); 
                img.src = ev.target.result; 
              };
              r.readAsDataURL(f);
            }
          };

          edit.onclick = () => {
            if (!this.editMode) return;
            const editing = desc.contentEditable === 'true';
            if (editing) {
              this.data[i].description = desc.textContent.trim();
              this.save();
              desc.contentEditable = 'false';
              edit.textContent = 'Ред.';
            } else {
              desc.contentEditable = 'true';
              desc.focus();
              edit.textContent = 'Сохранить';
            }
          };

          del.onclick = () => {
            if (confirm(`Удалить "${item.title}"?`)) {
              this.data.splice(i, 1);
              this.save();
              this.render();
            }
          };
        }
      }

      escape(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    }

    // Запуск после загрузки DOM
    document.addEventListener('DOMContentLoaded', () => {
      new ScreenshotDB();
    });
  </script>
</body>
</html>
