<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Класснеймы донат вещей</title>
  <style>
    :root {
      --bg1: #000000;
      --bg2: #0a001a;
      --panel: rgba(20, 0, 40, 0.85);
      --line: rgba(255, 255, 255, 0.08);
      --text: #e5eefc;
      --muted: #8ea0c0;
      --accent: #9d39fc;
      --accent2: #8036f5;
      --success: #22c55e;
      --danger: #ef4444;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, #000000, #120030, #2b0077);
      min-height: 100vh; padding: 28px 16px 44px;
    }
    .wrap { max-width: 1800px; margin: 0 auto; }
    
    .auth-btn-fixed {
      position: fixed; top: 32px; right: 32px; z-index: 9999;
      background: linear-gradient(135deg, var(--accent), #c46af7);
      border: 0; border-radius: 50px; padding: 16px 24px; 
      color: white; font: inherit; font-weight: 700; font-size: 14px;
      box-shadow: 0 16px 40px rgba(157, 57, 252, 0.45); cursor: pointer;
      transition: all 0.3s ease; backdrop-filter: blur(20px);
    }
    .auth-btn-fixed:hover { 
      transform: translateY(-4px) scale(1.05); 
      box-shadow: 0 24px 60px rgba(157, 57, 252, 0.6); 
    }
    .auth-btn-fixed.authenticated {
      background: linear-gradient(135deg, var(--success), #16a34a);
      animation: pulse 2s infinite;
    }
    .auth-btn-fixed.authenticated:hover {
      box-shadow: 0 24px 60px rgba(34,197,94,0.6);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 16px 40px rgba(34,197,94,0.4); }
      50% { box-shadow: 0 16px 40px rgba(34,197,94,0.7); }
    }
    
    .auth-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.9); z-index: 10000; display: none; 
      align-items: center; justify-content: center; backdrop-filter: blur(20px);
    }
    .auth-panel {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); 
      padding: 48px; max-width: 420px; width: 90%; box-shadow: var(--shadow);
      text-align: center;
    }
    .auth-panel h2 { margin: 0 0 32px 0; color: var(--accent); font-size: 28px; }
    .auth-field { position: relative; margin-bottom: 24px; }
    .auth-field input {
      width: 100%; border: 1px solid rgba(255,255,255,0.1); background: rgba(20, 0, 40, 0.7); 
      color: #fff; border-radius: 14px; padding: 18px 20px; font-size: 16px; box-sizing: border-box;
    }
    .auth-field input:focus { 
      border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(128,54,245,0.16); outline: none; 
    }
    .auth-btn {
      width: 100%; border: 0; border-radius: 16px; padding: 18px; font: inherit; font-weight: 700; 
      color: white; cursor: pointer; background: linear-gradient(135deg, var(--accent2), #9d39fc);
      box-shadow: 0 12px 28px rgba(128,54,245,0.45); transition: all 0.2s ease;
    }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 36px rgba(128,54,245,0.55); }
    .auth-error { color: var(--danger); margin-top: 16px; font-size: 14px; display: none; }
    
    .edit-hidden { display: none; }
    .edit-visible { display: inline-flex; }
    
    .hero {
      margin-bottom: 28px;
    }
    .hero h1 { margin: 0 0 8px 0; font-size: 28px; font-weight: 800; }
    .hero p { margin: 0 0 0; color: var(--muted); font-size: 16px; }
    
    .controls {
      margin-top: 16px;
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .controls button {
      padding: 10px 18px; font-size: 14px;
    }

    /* ✅ ИСПРАВЛЕННЫЙ table-head - заголовки РОВНО НАД ГРАФАМИ */
    .table-head { 
      display: grid; 
      grid-template-columns: 1.5fr 500px 2.5fr 140px;
      padding: 18px 14px;
      border-bottom: 1px solid var(--line); 
      background: rgba(255, 255, 255, 0.03); 
      color: #f4f7ff; 
      text-transform: uppercase; 
      letter-spacing: 0.09em; 
      font-size: 12px; 
      font-weight: 800; 
      align-items: center;
    }
    .table-head div {
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      letter-spacing: 0.1em;
    }
    .row > div { 
      padding: 18px 14px; 
      display: flex; 
      align-items: center; 
      min-height: 100%; 
    }
    .rows { display: flex; flex-direction: column; max-height: 75vh; overflow-y: auto; }
    .row { 
      border-bottom: 1px solid var(--line); 
      background: rgba(255, 255, 255, 0.015); 
      transition: all 0.2s ease; 
      display: grid; 
      grid-template-columns: 1.5fr 500px 2.5fr 140px;
    }
    
    .title { 
      font-size: 18px; 
      font-weight: 800; 
      line-height: 1.3; 
      color: var(--accent); 
      background: rgba(157, 57, 252, 0.18); 
      padding: 12px 16px; 
      border-radius: 12px; 
      border: 2px solid rgba(157, 57, 252, 0.48); 
      min-height: 24px;
    }
    .title.editing {
      background: rgba(80, 40, 160, 0.22);
      border-color: var(--accent2);
      padding: 10px 14px;
    }
    
    .cell-title {
      color: #eee9ee !important;
    }
    
    .thumb { 
      width: 460px !important; 
      height: 280px !important; 
      object-fit: cover; 
      border-radius: 18px; 
      border: 2px solid rgba(255, 255, 255, 0.15); 
      cursor: zoom-in; 
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.4); 
      transition: all 0.3s ease; 
    }
    .thumb:hover { 
      transform:scale(1.015) !important; 
      border-color: rgba(128,54,245,0.75); 
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5); 
    }
    
    /* LIGHTBOX – ПОЛНЫЙ ЭКРАН СКРИНШОТА */
    .lightbox {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.95); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      z-index: 10001; 
      opacity: 0; 
      pointer-events: none; 
      transition: opacity 0.3s ease;
    }
    .lightbox.active {
      opacity: 1;
      pointer-events: all;
    }
    .lightbox img {
      max-width: 90vw; 
      max-height: 90vh; 
      border-radius: 16px; 
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.7);
    }
    .lightbox-close {
      position: absolute; top: 40px; right: 40px; 
      background: rgba(255,255,255,0.15); 
      border-radius: 50%; 
      width: 40px; height: 40px; 
      display: flex; 
      align-items: center; justify-content: center; 
      cursor: pointer; 
      color: #fff;
      font-size: 24px; 
      border: 0;
    }
    .lightbox-close:hover {
      background: rgba(255,255,255,0.25);
    }
    
    .description { 
      color: var(--text); 
      font-size: 15px; 
      line-height: 1.5; 
      padding: 20px; 
      background: rgba(255, 255, 255, 0.03); 
      border-radius: 16px; 
      border: 1px solid var(--line); 
      white-space: pre-wrap; 
      max-height: 120px; 
      overflow-y: auto; 
    }
    .description:empty::before { content: "Класснеймы не указаны"; color: var(--muted); font-style: italic; }
    
    button { border: 0; border-radius: 16px; padding: 12px 18px; font: inherit; font-weight: 700; color: white; cursor: pointer; transition: all 0.18s ease; box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24); }
    button:hover { transform: translateY(-1px); }
    .btn-edit { background: linear-gradient(135deg, #2563eb, #9d39fc); }
    .btn-add { background: linear-gradient(135deg, #059669, #10b981); }
    .btn-save { background: linear-gradient(135deg, #0ea5e9, #2563eb); display: none; }
    .btn-cancel { background: linear-gradient(135deg, #ef4444, #f97316); display: none; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); backdrop-filter: blur(18px); }
    .row:hover { background: rgba(255, 255, 255, 0.05); }
    .actions { justify-content: flex-end; gap: 8px; }
    .icon-btn { padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: 800; box-shadow: none; }
    .edit-row-btn { background: linear-gradient(135deg, #f59e0b, #f97316); }
    .delete-row-btn { background: linear-gradient(135deg, #dc2626, #ef4444); }
    
    .new-row { display: none; padding: 30px; background: rgba(255, 255, 255, 0.03); }
    .new-row.active { display: block; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { color: var(--muted); font-size: 13px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
    .field input, .field textarea { width: 100%; border: 1px solid rgba(255,255,255,0.1); background: rgba(20, 0, 40, 0.7); color: #fff; border-radius: 14px; padding: 16px; font: inherit; }
    .field input:focus, .field textarea:focus { border-color: rgba(128,54,245,0.75); box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.16); }
    .field textarea { min-height: 140px; resize: vertical; }
    .preview-box { height: 320px; border-radius: 20px; border: 2px dashed rgba(255, 255, 255, 0.18); background: rgba(255, 255, 255, 0.04); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; }
    .preview-box:hover { border-color: rgba(128,54,245,0.75); transform: translateY(-3px); }
    .preview-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .hidden-file { display: none; }
    .status { padding: 14px; border-radius: 12px; margin-top: 20px; font-size: 15px; display: none; }
    .status.success { background: rgba(34,197,94,0.2); border: 1px solid var(--success); color: var(--success); }
    
    @media (max-width: 1400px) { 
      .table-head, .row { grid-template-columns: 1fr 460px 2fr 120px; } 
      .thumb { width: 420px; height: 260px; } 
    }
    @media (max-width: 1100px) { 
      .table-head, .row { grid-template-columns: 1fr 380px 2fr 120px; } 
      .thumb { width: 350px; height: 220px; } 
    }
    @media (max-width: 920px) { 
      .table-head, .row { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .thumb { width: 100%; height: 260px; }
      .preview-box { height: 280px; }
      .row { grid-template-columns: 1fr; }
      .table-head div, .row > div { padding: 16px 12px; }
      .auth-btn-fixed { top: 20px; right: 20px; padding: 14px 20px; font-size: 13px; }
      .controls { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <button id="authToggle" class="auth-btn-fixed">Авторизация</button>
  
  <div id="authModal" class="auth-modal">
    <div class="auth-panel">
      <h2>Вход в админку</h2>
      <div class="auth-field">
        <input type="text" id="loginInput" placeholder="Логин" maxlength="20">
      </div>
      <div class="auth-field">
        <input type="password" id="passwordInput" placeholder="Пароль" maxlength="20">
      </div>
      <button class="auth-btn" onclick="checkAuth()">Войти</button>
      <div id="authError" class="auth-error">Неверный логин или пароль</div>
    </div>
  </div>

  <!-- LIGHTBOX ДЛЯ СКРИНШОТА (ПОЛНЫЙ ЭКРАН) -->
  <div id="lightbox" class="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <img id="lightboxImg" alt="Скриншот">
  </div>

  <div class="wrap">
    <div class="hero">
      <div class="title-block">
        <h1>Класснеймы донат вещей</h1>
        <p></p>
      </div>
      <div class="controls">
      <button class="btn-edit edit-hidden" id="toggleEdit">Редактировать</button>
      <button class="btn-add edit-hidden" id="openNewRow">Добавить</button>
      <button class="btn-save" id="saveNewRow">Сохранить</button>
    <button class="btn-cancel" id="cancelNewRow">Отмена</button>
</div>
    </div>

    <div class="panel">
      <div class="table-head">
        <div>Название</div>
        <div>Скриншот</div>
        <div>Класснеймы</div>
        <div></div>
      </div>

      <div id="newRowForm" class="new-row edit-hidden">
        <div class="form-grid">
         <div class="field">
           <label>Название</label>
           <input type="text" id="newTitle" placeholder="Название (можно редактировать)">
         </div>
         <div class="field">
           <label>Скриншот</label>
           <div class="preview-box" id="newPreviewBox">
             <span id="newPreviewText">Клик для загрузки</span>
             <img id="newPreviewImg" alt="Предпросмотр">
           </div>
           <input class="hidden-file" type="file" id="newImageInput" accept="image/*">
         </div>
        </div>
        <div class="field" style="grid-column: 1/-1; margin-top: 24px;">
         <label>Класснеймы</label>
         <textarea id="newDescription" placeholder="Введите класснеймы..."></textarea>
        </div>
        <div id="status" class="status"></div>
      </div>

      <div class="rows" id="rows"></div>
    </div>
  </div>

  <script>
let isAuthenticated = false;
let db = null;

const AUTH_DATA = atob('UmF6ZG9yOjIyODEzMzc=');
const [AUTH_LOGIN, AUTH_PASS] = AUTH_DATA.split(':');

const GITHUB = {
  OWNER:   "Razdor404",          
  REPO:    "screenshots",
  TOKEN:   "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",     
  BRANCH:  "Razdor404.github.io-main",            

  async fetchFile(path) {
    const url = `https://api.github.com/repos/${this.OWNER}/${this.REPO}/contents/${path}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const json = await res.json();
    const content = atob(json.content);
    return JSON.parse(content);
  },

  async getSha(path) {
    const url = `https://api.github.com/repos/${this.OWNER}/${this.REPO}/contents/${path}`;
    const res = await fetch(url);
    return res.ok ? (await res.json()).sha : null;
  },

  async writeFile(path, content, message = "update screenshots list") {
    const url = `https://api.github.com/repos/${this.OWNER}/${this.REPO}/contents/${path}`;

    const data = {
      message,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
      branch: this.BRANCH
    };

    const sha = await this.getSha(path);
    if (sha) data.sha = sha;

    const res = await fetch(url, {
      method:  "PUT",
      headers: {
        Authorization: "Bearer " + this.TOKEN,
        Accept:        "application/vnd.github.v3+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (!res.ok) {
      const err = await res.text();
      console.error("GitHub API error:", err);
    }
    return res.ok;
  }
};

function showEditMode(enable) {
  // Показываем/скрываем кнопки редактирования
  const editBtns = document.querySelectorAll('.edit-hidden');
  editBtns.forEach(btn => {
    btn.style.display = enable ? 'inline-flex' : 'none';
  });
}

function openLightbox(src) {
  const lightbox = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  img.src = src;
  lightbox.classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

class ScreenshotDB {
  constructor() {
    db = this;
    this.DATA_PATH = "data/data.json";
    this.data = [];
    this.editMode = false;
    this.init();
  }

  async load() {
    const saved = await GITHUB.fetchFile(this.DATA_PATH);
    return Array.isArray(saved) ? saved : [];
  }

  async save() {
    const ok = await GITHUB.writeFile(this.DATA_PATH, this.data, "update screenshots list");
    if (ok) this.status("Сохранено", "success");
  }

  status(msg, type = 'success') {
    const el = document.getElementById('status');
    if (!el) return;
    el.textContent = msg;
    el.className = `status ${type}`;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2500);
  }

  async init() {
    this.data = await this.load();
    this.render();
    
    // ✅ ПРИВЯЗЫВАЕМ ОБРАБОТЧИКИ ТОЛЬКО ЕСЛИ АДМИН ВОШЁЛ
    if (isAuthenticated) {
      this.bindButtons();
    }

    this.bindPreview();
  }

  bindButtons() {
    document.getElementById('toggleEdit').onclick = () => this.toggleEdit();
    document.getElementById('openNewRow').onclick = () => this.newForm();
    document.getElementById('saveNewRow').onclick = () => this.saveNew();
    document.getElementById('cancelNewRow').onclick = () => this.cancelNew();
  }

  bindPreview() {
    const previewBox = document.getElementById('newPreviewBox');
    const fileInput  = document.getElementById('newImageInput');
    previewBox.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const img   = document.getElementById('newPreviewImg');
      const text  = document.getElementById('newPreviewText');
      const reader = new FileReader();

      reader.onload = (ev) => {
        img.src = ev.target.result;
        img.style.display = 'block';
        text.style.display = 'none';
      };
      reader.onerror = () => this.status('Ошибка загрузки изображения', 'error');
      reader.readAsDataURL(file);
    };
  }

  async saveNew() {
    const title = document.getElementById('newTitle').value.trim();
    const desc  = document.getElementById('newDescription').value.trim();
    const file  = document.getElementById('newImageInput').files[0];

    if (!title || !file) {
      this.status('Название и скриншот обязательны');
      return;
    }

    const reader = new FileReader();
    reader.onload = async (e) => {
      this.data.push({
        title,
        description: desc,
        image: e.target.result
      });
      await this.save();
      this.render();
      this.cancelNew();
    };
    reader.onerror = () => this.status('Ошибка чтения изображения', 'error');
    reader.readAsDataURL(file);
  }

  render() {
    const rows = document.getElementById('rows');
    if (!rows) return;

    rows.innerHTML = this.data.length
      ? ''
      : '<div style="padding:60px;text-align:center;color:var(--muted);">Добавьте первый скриншот</div>';

    this.data.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div class="name-cell">
         <div class="title cell-title" contentEditable="${this.editMode && isAuthenticated ? 'true' : 'false'}">
           ${this.escape(item.title)}
         </div>
        </div>
        <div>
         <img class="thumb cell-image" src="${item.image}" alt="${item.title}" onclick="openLightbox('${item.image}')">
         <input class="hidden-file row-file" type="file" accept="image/*">
        </div>
        <div>
         <div class="description cell-description" contentEditable="false">
           ${item.description || ''}
         </div>
        </div>
        <div class="actions">
         <button class="icon-btn edit-row-btn ${!isAuthenticated ? 'edit-hidden' : ''}">Ред.</button>
         <button class="icon-btn delete-row-btn ${!isAuthenticated ? 'edit-hidden' : ''}">Удалить</button>
        </div>
      `;
      rows.appendChild(row);
      if (isAuthenticated) this.bindRow(row, i, item);
    });
  }

  bindRow(row, i, item) {
    const title = row.querySelector('.cell-title');
    const img   = row.querySelector('.cell-image');
    const file  = row.querySelector('.row-file');
    const edit  = row.querySelector('.edit-row-btn');
    const del   = row.querySelector('.delete-row-btn');
    const desc  = row.querySelector('.cell-description');

    img.onclick = () => openLightbox(img.src);

    title.onclick = () => {
      if (this.editMode) {
        title.contentEditable = true;
        title.focus();
      }
    };
    title.onblur = async () => {
      item.title = (title.textContent || '').trim() || item.title;
      await this.save();
      title.contentEditable = false;
    };
    title.onkeydown = (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        title.blur();
      }
    };

    file.onchange = async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        this.data[i].image = ev.target.result;
        await this.save();
        img.src = ev.target.result;
      };
      reader.readAsDataURL(f);
    };

    edit.onclick = async () => {
      if (!this.editMode) return;
      const editing = desc.contentEditable === 'true';
      if (editing) {
        this.data[i].description = (desc.textContent || '').trim();
        await this.save();
        desc.contentEditable = 'false';
        edit.textContent = 'Ред.';
      } else {
        desc.contentEditable = 'true';
        desc.focus();
        edit.textContent = 'Сохранить';
      }
    };

    del.onclick = async () => {
      if (confirm(`Удалить "${item.title}"?`)) {
        this.data.splice(i, 1);
        await this.save();
        this.render();
      }
    };
  }

  toggleEdit() {
    this.editMode = !this.editMode;
    const btn = document.getElementById('toggleEdit');
    btn.textContent = this.editMode ? 'Завершить' : 'Редактировать';
    document.getElementById('openNewRow').style.display = this.editMode ? 'inline-flex' : 'none';
    if (!this.editMode) this.cancelNew();
    this.render(); // Перерисовка для обновления contentEditable
  }

  newForm() {
    document.getElementById('newRowForm').classList.add('active');
    document.getElementById('saveNewRow').style.display = 'inline-flex';
    document.getElementById('cancelNewRow').style.display = 'inline-flex';
    document.getElementById('newTitle').focus();
  }

  cancelNew() {
    document.getElementById('newRowForm').classList.remove('active');
    document.getElementById('saveNewRow').style.display = 'none';
    document.getElementById('cancelNewRow').style.display = 'none';
    this.resetForm();
  }

  resetForm() {
    document.getElementById('newTitle').value = '';
    document.getElementById('newDescription').value = '';
    document.getElementById('newImageInput').value = '';
    document.getElementById('newPreviewImg').style.display = 'none';
    document.getElementById('newPreviewText').style.display = 'block';
  }

  escape(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
}

// ✅ ИНИЦИАЛИЗАЦИЯ
document.addEventListener('DOMContentLoaded', () => {
  // Проверяем сохранённую авторизацию
  if (localStorage.getItem('auth') === 'true') {
    isAuthenticated = true;
    const btn = document.getElementById('authToggle');
    btn.textContent = 'Админ';
    btn.classList.add('authenticated');
    showEditMode(true);
  }

  // Обработчик кнопки авторизации
  document.getElementById('authToggle').onclick = () => {
    if (isAuthenticated) {
      if (confirm('Выйти из админки?')) {
        isAuthenticated = false;
        localStorage.removeItem('auth');
        const btn = document.getElementById('authToggle');
        btn.textContent = 'Авторизация';
        btn.classList.remove('authenticated');
        showEditMode(false);
        if (db) db.render();
      }
    } else {
      document.getElementById('authModal').style.display = 'flex';
    }
  };

  // Закрытие модалки по клику вне панели
  document.getElementById('authModal').onclick = (e) => {
    if (e.target.id === 'authModal') {
      document.getElementById('authModal').style.display = 'none';
    }
  };

  new ScreenshotDB();
});

function checkAuth() {
  const login = document.getElementById('loginInput').value.trim();
  const pass  = document.getElementById('passwordInput').value.trim();
  const error = document.getElementById('authError');

  if (login === AUTH_LOGIN && pass === AUTH_PASS) {
    isAuthenticated = true;
    localStorage.setItem('auth', 'true');
    document.getElementById('authModal').style.display = 'none';
    
    const btn = document.getElementById('authToggle');
    btn.textContent = 'Админ';
    btn.classList.add('authenticated');
    
    showEditMode(true);
    
    // ✅ ПЕРЕИНИЦИАЛИЗИРУЕМ КНОПКИ ПОСЛЕ ВХОДА
    if (db) {
      db.bindButtons();
      db.render();
    }
  } else {
    error.style.display = 'block';
    setTimeout(() => error.style.display = 'none', 2500);
  }
}
</script>
